name = "price-scout"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = ["0 6 * * *"]  # Daily at 6am UTC

[[d1_databases]]
binding = "DB"
database_name = "price-scout-db"
database_id = "" # Will be filled after creation

[browser]
binding = "BROWSER"

[vars]
ENVIRONMENT = "production"
