name = "price-scout"
main = "src/index.ts"
compatibility_date = "2024-12-01"
compatibility_flags = ["nodejs_compat"]

[triggers]
crons = ["0 6 * * 1"]  # Weekly on Monday at 6am UTC

[[d1_databases]]
binding = "DB"
database_name = "price-scout-db"
database_id = "dbc6c5ce-3303-435e-bbd5-c5be665c03b9"

[browser]
binding = "BROWSER"

[vars]
ENVIRONMENT = "production"
